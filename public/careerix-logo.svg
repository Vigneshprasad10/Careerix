<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Main gradient purple to cyan -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <!-- Glow gradient for icon bg -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <!-- Icon background gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#020818"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="400" height="120" fill="transparent"/>

  <!-- Icon container: rounded square -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#iconBg)" stroke="url(#mainGrad)" stroke-width="1.5"/>

  <!-- Glow behind icon -->
  <ellipse cx="60" cy="60" rx="45" ry="45" fill="url(#glowGrad)"/>

  <!-- C lettermark with gap suggesting a circuit/arc -->
  <path d="M 78 35
             A 32 32 0 1 0 78 85
             "
        fill="none"
        stroke="url(#mainGrad)"
        stroke-width="9"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Circuit dot top -->
  <circle cx="78" cy="35" r="5" fill="#8b5cf6" filter="url(#glow)"/>
  <!-- Circuit dot bottom -->
  <circle cx="78" cy="85" r="5" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Small circuit lines extending from dots -->
  <line x1="78" y1="35" x2="93" y2="35" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="93" y1="35" x2="93" y2="25" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="93" cy="25" r="3" fill="#8b5cf6" filter="url(#glow)"/>

  <line x1="78" y1="85" x2="93" y2="85" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="93" y1="85" x2="93" y2="95" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="93" cy="95" r="3" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="60" cy="60" r="4" fill="url(#mainGrad)" filter="url(#glow)"/>

  <!-- CAREERIX wordmark -->
  <!-- C -->
  <text x="128" y="72" font-family="'Arial', sans-serif" font-weight="800" font-size="46" fill="url(#mainGrad)" letter-spacing="-1" filter="url(#softglow)">CAREERIX</text>

  <!-- Tagline -->
  <text x="129" y="92" font-family="'Arial', sans-serif" font-weight="400" font-size="11.5" fill="#6b7280" letter-spacing="3.5">AI CAREER INTELLIGENCE</text>

  <!-- Thin gradient underline beneath wordmark -->
  <rect x="128" y="79" width="258" height="1.5" rx="1" fill="url(#mainGrad)" opacity="0.5"/>

</svg>
