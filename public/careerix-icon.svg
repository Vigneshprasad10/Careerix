<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#020818"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="outerglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#iconBg)"/>

  <!-- Gradient border -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="url(#mainGrad)" stroke-width="1.5"/>

  <!-- Ambient glow -->
  <ellipse cx="50" cy="50" rx="42" ry="42" fill="url(#glowGrad)"/>

  <!-- C arc -->
  <path d="M 68 26 A 28 28 0 1 0 68 74"
        fill="none"
        stroke="url(#mainGrad)"
        stroke-width="8.5"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Top circuit dot -->
  <circle cx="68" cy="26" r="5" fill="#8b5cf6" filter="url(#glow)"/>
  <!-- Bottom circuit dot -->
  <circle cx="68" cy="74" r="5" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Top circuit line -->
  <line x1="68" y1="26" x2="82" y2="26" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="82" y1="26" x2="82" y2="16" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="82" cy="16" r="3" fill="#8b5cf6" filter="url(#glow)"/>

  <!-- Bottom circuit line -->
  <line x1="68" y1="74" x2="82" y2="74" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="82" y1="74" x2="82" y2="84" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="82" cy="84" r="3" fill="#06b6d4" filter="url(#glow)"/>

  <!-- Center pulse dot -->
  <circle cx="50" cy="50" r="4.5" fill="url(#mainGrad)" filter="url(#outerglow)"/>

</svg>
